<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
</head>
<body>
  <h2>Reset Your Password</h2>
  <div id="status"></div>
  <input type="password" id="newPassword" placeholder="New password">
  <button id="resetBtn">Reset Password</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNLbwPkf8OyR48bheGcCKN0JyM6gdHaIY",
      authDomain: "stemhub-b2c24.firebaseapp.com",
      projectId: "stemhub-b2c24",
      storageBucket: "stemhub-b2c24.firebasestorage.app",
      messagingSenderId: "951151256621",
      appId: "1:951151256621:web:a3de82daa47eacc50b44a4",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Grab the code from the URL
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");

    if (!oobCode) {
      document.getElementById("status").textContent =
        "No reset code found. Please request a new password reset email.";
    }

    document.getElementById("resetBtn").addEventListener("click", async () => {
      const newPassword = document.getElementById("newPassword").value;
      if (!newPassword) return alert("Enter a new password");

      try {
        await confirmPasswordReset(auth, oobCode, newPassword);
        alert("Password updated successfully!");
        window.location.href = "/login.html"; 
      } catch (error) {
        alert("Error resetting password: " + error.message);
      }
    });
  </script>
</body>
</html>
